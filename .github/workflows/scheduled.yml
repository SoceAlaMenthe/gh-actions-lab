name: Tache planifiee

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/scheduled.yml'

  schedule:
    # Chaque jour ouvre (lundi-vendredi) a 09:00 UTC
    - cron: '0 9 * * 1-5'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  tache-planifiee:
    runs-on: ubuntu-latest
    steps:
      - name: Afficher l heure d execution
        run: echo "Execution planifiee a $(date -u)"

      - name: Afficher l environnement selectionne
        run: echo "Environnement choisi - ${{ github.event.inputs.environment || 'aucun (execution cron)' }}"
