name: Tache planifiee

on:
  schedule:
    # Chaque jour ouvré (lundi-vendredi) à 09:00 UTC
    - cron: '0 9 * * 1-5'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  tache-planifiee:
    runs-on: ubuntu-latest
    steps:
      - name: Afficher l'heure d'exécution
        run: echo "Exécution planifiée à $(date -u)"

      - name: Afficher l'environnement sélectionné
        run: echo "Environnement choisi : ${{ github.event.inputs.environment || 'aucun (exécution cron)' }}"
